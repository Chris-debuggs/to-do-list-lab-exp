<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="A premium, simple To-Do List application.">
  <title>Todo List</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app" id="todo-app">
    <h1>📝 Todo List</h1>

    <form id="todo-form" class="input-box" aria-label="Add a new task">
      <input id="todo-input" type="text" placeholder="Add a task..." required aria-label="Task input" />
      <button type="submit" aria-label="Add task">Add</button>
    </form>

    <div class="filters" aria-label="Filter tasks">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul id="todo-list" aria-live="polite"></ul>

    <button class="save-btn" onclick="saveAsImage()" aria-label="Save as PNG">
      Save as PNG
    </button>
  </main>

  <!-- html2canvas CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
